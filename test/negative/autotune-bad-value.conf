# autotune must be yes or no -- anything else is a typo that would silently
# fall through to "yes" and add a flag the author did not ask for.
[defaults]
	host_label = arc
	dst        = root@far:backup/arc

[template:hourly]
	send_schedule = 59 * * * *
	prefix        = automated_

[dataset:tank/x]
	use_template = hourly
	autotune     = maybe
	notify       = x
