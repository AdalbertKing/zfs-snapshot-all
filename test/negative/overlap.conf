# Two tiers on the SAME scope whose patterns are prefix-subsumed
# (automated_ is a prefix of automated_hourly) -> must be rejected.
[defaults]
	host_label = t
[template:hourly]
	prune_schedule = 0 * * * *
	pattern        = automated_hourly
	keep           = 5
[template:daily]
	prune_schedule = 0 1 * * *
	pattern        = automated_
	keep           = 3
[prune:tank/store]
	use_template = hourly,daily
	recursive    = yes
