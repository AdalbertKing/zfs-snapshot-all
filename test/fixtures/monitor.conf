# Golden: monitor_warn/monitor_crit riding inline [dataset:] self-prune and a
# [prune:] section, grouped by (schedule,pattern,warn,crit,recursive), and one
# unmonitored tier (daily has no monitor_warn/crit -> no check line for it).
[defaults]
	host_label = testhost

[template:hourly]
	send_schedule  = 5 * * * *
	prefix         = automated_hourly_
	notify_word    = snapshot
	prune_schedule = 35 * * * *
	pattern        = automated_hourly
	keep           = 24
	monitor_warn   = 90m
	monitor_crit   = 3h

[template:daily]
	send_schedule  = 10 0 * * *
	prefix         = automated_daily_
	notify_word    = snapshot
	prune_schedule = 40 0 * * *
	pattern        = automated_daily
	keep           = 7

[template:store_weekly]
	prune_schedule = 50 0 * * 0
	pattern        = automated_weekly
	retain         = -W8
	tier_label     = weekly
	monitor_warn   = 9d
	monitor_crit   = 12d
	monitor_schedule = 0 */6 * * *

[dataset:tank/a]
	use_template = hourly,daily
	flags        = -e -v 3
	notify       = groupA

[dataset:tank/b]
	use_template = hourly,daily
	flags        = -e -v 3
	notify       = groupA

[prune:backup/store]
	use_template = store_weekly
	recursive    = yes
	notify       = store
