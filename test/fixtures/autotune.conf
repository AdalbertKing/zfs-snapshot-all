# Golden: automatic -A. Every dataset here shares one template, so the ONLY
# thing that varies between the generated send lines is what maybe_add_autotune
# decided -- which is exactly what this fixture is for.
#
# remote      inherits the remote [defaults] dst  -> -A added
# local       overrides dst to a local path       -> not added, nothing to measure
# already     already says -A                     -> not doubled
# explicit-z  names a compressor                  -> not added, the flag wins
# optedout    autotune = no                       -> not added
# tiered      per-tier flags override             -> -A rides the override too
[defaults]
	host_label = arc
	dst        = root@far:backup/arc

[template:hourly]
	send_schedule = 59 * * * *
	prefix        = automated_

[dataset:tank/remote]
	use_template = hourly
	flags        = -e -v 3
	notify       = remote

[dataset:tank/local]
	use_template = hourly
	dst          = backup/local
	flags        = -e -v 3
	notify       = local

[dataset:tank/already]
	use_template = hourly
	flags        = -e -A -v 3
	notify       = already

[dataset:tank/explicit-z]
	use_template = hourly
	flags        = -e -z -v 3
	notify       = explicit z

[dataset:tank/optedout]
	use_template = hourly
	flags        = -e -v 3
	autotune     = no
	notify       = opted out

# No 'flags' at all: -A must still be added, and must not produce a stray
# leading space in the command.
[dataset:tank/bare]
	use_template = hourly
	notify       = bare

[dataset:tank/tiered]
	use_template  = hourly
	flags         = -e
	flags_hourly  = -e -u
	notify        = tiered
