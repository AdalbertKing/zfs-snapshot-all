# Golden: send-only dataset (template has no prune fields -> no inline prune),
# dst inherited from [defaults], -e flag, a [prune:] section with recursive +
# clear_cut (-R -F), tier_label surfacing a store_ tier id as a clean word.
[defaults]
	host_label = arc
	dst        = backup/arc

[template:hourly]
	send_schedule = 59 * * * *
	prefix        = automated_

[template:store_hourly]
	prune_schedule = 51 * * * *
	pattern        = automated_hourly
	retain         = -H48
	tier_label     = hourly

[dataset:tank/replica]
	use_template = hourly
	flags        = -e -z
	notify       = repl

[prune:backup/arc]
	use_template = store_hourly
	recursive    = yes
	clear_cut    = yes
	notify       = arc
