# Golden: [prune-bookmarks:] sections -- age-based cleanup of orphaned
# snapsend/snapget bookmarks. Two scopes with different 'recursive' must NOT
# merge into one line even though schedule/pattern/age are identical; a
# third scope on the same schedule/age/recursive as the first DOES merge
# (comma-joined). Default pattern ("tgt-") is exercised on all three;
# explicit pattern override is exercised separately.
[defaults]
	host_label = arc

[prune-bookmarks:tank/src1]
	schedule  = 30 4 * * *
	age       = -d30
	notify    = orphans

[prune-bookmarks:tank/src2]
	schedule  = 30 4 * * *
	age       = -d30
	notify    = orphans

[prune-bookmarks:tank/deep]
	schedule  = 30 4 * * *
	age       = -d30
	recursive = yes
	notify    = orphans

[prune-bookmarks:tank/custom]
	schedule  = 0 5 * * *
	age       = -h12
	pattern   = mytag-
	notify    = custom
