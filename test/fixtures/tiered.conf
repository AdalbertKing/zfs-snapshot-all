# Golden: send-merge, inline self-prune by full path, per-dataset retention
# override (split), a recursive [prune:] section, tier_label, keep->letter + retain.
[defaults]
	host_label = testhost

[template:hourly]
	send_schedule  = 5 * * * *
	prefix         = automated_hourly_
	notify_word    = snapshot
	prune_schedule = 35 * * * *
	pattern        = automated_hourly
	keep           = 24

[template:daily]
	send_schedule  = 10 0 * * *
	prefix         = automated_daily_
	notify_word    = snapshot
	prune_schedule = 40 0 * * *
	pattern        = automated_daily
	keep           = 7

[template:store_daily]
	prune_schedule = 50 0 * * *
	pattern        = automated_daily
	retain         = -D30
	tier_label     = daily

[dataset:tank/a]
	use_template = hourly,daily
	flags        = -z -v 3
	notify       = groupA

[dataset:tank/b]
	use_template = hourly,daily
	flags        = -z -v 3
	notify       = groupA

[dataset:tank/c]
	use_template = daily
	keep         = 14
	flags        = -z -v 3
	notify       = groupC

[prune:backup/store]
	use_template = store_daily
	recursive    = yes
	notify       = store
