# Golden: quiesce = <mode> -> snapsend.sh -q <mode>. Deliberately NOT inferred
# from the dataset name the way -A is inferred from dst: whether a guest can be
# frozen depends on what runs inside it and what a brief write stall costs there,
# and neither is visible from outside.
[defaults]
	host_label = arc
	dst        = backup/arc

[template:hourly]
	send_schedule = 59 * * * *
	prefix        = automated_

[dataset:tank/vm-101-disk-0]
	use_template = hourly
	quiesce      = agent
	notify       = vm101

[dataset:tank/subvol-102-disk-0]
	use_template = hourly
	quiesce      = sync
	notify       = ct102

[dataset:tank/mixed]
	use_template = hourly
	quiesce      = auto
	flags        = -v 3
	notify       = mixed

# Default is no: an unset quiesce must leave the command exactly as it was.
[dataset:tank/plain]
	use_template = hourly
	notify       = plain

[dataset:tank/off]
	use_template = hourly
	quiesce      = no
	notify       = off

# -e reuses an existing snapshot, so there is nothing being created for a freeze
# to make consistent. Still emitted (the user asked for it) but warned about.
[dataset:tank/existing]
	use_template = hourly
	quiesce      = agent
	flags        = -e
	notify       = existing
