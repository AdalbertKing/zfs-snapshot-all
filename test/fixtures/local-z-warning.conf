# Golden: the "-z does nothing here" warning. Since snapsend v2.32 a local send
# skips compression outright, so the flag is dead weight that misdescribes the
# job. Warned about, never fatal -- it is harmless at runtime, and a regeneration
# that refuses to emit a crontab is worse than one that emits a correct crontab
# and says tidy your config.
#
# Warnings go to stderr; this suite merges 2>&1, which is how they land here.
[defaults]
	host_label = arc

[template:hourly]
	send_schedule = 59 * * * *
	prefix        = automated_

[dataset:tank/local-z]
	use_template = hourly
	dst          = backup/arc
	flags        = -e -z
	notify       = local z

[dataset:tank/local-Z]
	use_template = hourly
	dst          = backup/arc
	flags        = -e -Z
	notify       = local Z

[dataset:tank/local-g]
	use_template = hourly
	dst          = backup/arc
	flags        = -e -g
	notify       = local g

# Remote: compression is real work over a real link, so no warning -- and note
# -A is NOT added here, because the explicit compressor flag wins.
[dataset:tank/remote-z]
	use_template = hourly
	dst          = root@far:backup/arc
	flags        = -e -z
	notify       = remote z

# No dst at all: a different case from "local target". snapsend gets one
# argument, creates a snapshot and transfers nothing, so the warning must say
# that rather than claim an empty dst is a local path.
[dataset:tank/nodst]
	use_template = hourly
	flags        = -e -z
	notify       = no dst
